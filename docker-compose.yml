services:
  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: "${NEO4J_AUTH}"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "${NEO4J_USER}"
      NEO4J_PASSWORD: "${NEO4J_PASSWORD}"

      XDG_DATA_HOME: /share
      XDG_STATE_HOME: /state
      XDG_CONFIG_HOME: /config
      XDG_CACHE_HOME: /cache

    volumes:
      - nnma_data:/share
      - nnma_state:/state
      - nnma_config:/config
      - nnma_cache:/cache

volumes:
  neo4j_data:
  neo4j_logs:
  nnma_data:
  nnma_state:
  nnma_config:
  nnma_cache:
